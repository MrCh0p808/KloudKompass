name: Bug Report
description: Create a report to help us improve Kloud Kompass
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "### Thanks for taking the time to report a bug!"
  - type: input
    id: version
    attributes:
      label: Kloud Kompass Version
      description: What version are you running? (e.g., 0.1.0)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: Please provide clear steps to reproduce the issue.
      value: |
        1. Run command '...'
        2. Select '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Please provide the error output (run your command with `--debug` if possible).
      render: shell
